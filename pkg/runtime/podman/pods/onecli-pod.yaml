apiVersion: v1
kind: Pod
metadata:
  name: onecli
  labels:
    app: onecli
spec:
  restartPolicy: Always
  containers:
    - name: postgres
      image: postgres:18-alpine
      env:
        - name: POSTGRES_USER
          value: "onecli"
        - name: POSTGRES_PASSWORD
          value: "onecli"
        - name: POSTGRES_DB
          value: "onecli"
      ports:
        - containerPort: 5432
          hostPort: 5432
          hostIP: "127.0.0.1"
        - containerPort: 10254
          hostPort: 10254
          hostIP: "127.0.0.1"
        - containerPort: 10255
          hostPort: 10255
          hostIP: "127.0.0.1"
      volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql
      readinessProbe:
        exec:
          command:
            - pg_isready
            - "-U"
            - onecli
        initialDelaySeconds: 15
        periodSeconds: 5
        timeoutSeconds: 3
        failureThreshold: 10

    - name: onecli
      image: ghcr.io/onecli/onecli:latest
      env:
        - name: DATABASE_URL
          value: "postgresql://onecli:onecli@localhost:5432/onecli"
        - name: NEXTAUTH_SECRET
          value: ""
        - name: NEXT_PUBLIC_APP_URL
          value: "http://127.0.0.1:10254"
        - name: APP_URL
          value: "http://127.0.0.1:10254"
      volumeMounts:
        - name: app-data
          mountPath: /app/data

  volumes:
    - name: pgdata
      persistentVolumeClaim:
        claimName: pgdata
    - name: app-data
      persistentVolumeClaim:
        claimName: app-data
